### 模型配置
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true

### 方法配置
stage: sft
do_train: true
finetuning_type: lora

### LoRA 配置
lora_target: all  # 对所有 linear 层应用 LoRA
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
additional_target: [embed_tokens, lm_head]  # 可选：也微调 embedding

### 数据集配置
dataset: identity,alpaca_zh  # 可以换成你自己的数据集
template: qwen
cutoff_len: 1024
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16

### 输出配置
output_dir: ./saves/qwen3.5-9b/lora/sft
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### 训练配置
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true  # 使用 bfloat16 精度
ddp_timeout: 180000000

### 评估配置
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500
