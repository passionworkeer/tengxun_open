### 模型配置
model_name_or_path: Qwen/Qwen3.5-9B  # 模型路径或HuggingFace模型名
trust_remote_code: true  # 允许执行远程代码

### 方法配置
stage: sft  # 监督微调阶段
do_train: true  # 执行训练
finetuning_type: lora  # 使用LoRA微调

### LoRA 微调配置
lora_target: all  # 对所有linear层应用LoRA（覆盖q/k/v/o/ffn等）
lora_rank: 8  # LoRA秩，越大参数量越多效果越好
lora_alpha: 16  # LoRA缩放因子，通常设为rank的2倍
lora_dropout: 0.05  # Dropout率，防止过拟合
additional_target: [embed_tokens, lm_head]  # 同时微调embedding和输出层

### 数据集配置
dataset: fintune_qwen_dep  # 数据集名称（需在dataset_info.json中注册）
template: qwen  # 使用Qwen的对话模板
cutoff_len: 1024  # 最大序列长度，根据显存调整
max_samples: 10000  # 最大采样数量
overwrite_cache: true  # 覆盖缓存
preprocessing_num_workers: 16  # 数据预处理线程数

### 输出配置
output_dir: ./saves/qwen3.5-9b/lora/finetune_dep  # 模型保存路径
logging_steps: 10  # 日志打印间隔
save_steps: 500  # 保存检查点间隔
plot_loss: true  # 绘制损失曲线图
overwrite_output_dir: true  # 覆盖输出目录

### 训练配置
per_device_train_batch_size: 1  # 每个GPU的batch大小
gradient_accumulation_steps: 8  # 梯度累积步数（实际batch=1*8=8）
learning_rate: 5.0e-5  # 学习率，LoRA常用5e-5
num_train_epochs: 3.0  # 训练轮数
lr_scheduler_type: cosine  # 学习率调度策略（余弦退火）
warmup_ratio: 0.1  # 预热比例（前10%步数用于学习率预热）
bf16: true  # 使用bfloat16精度，A100支持，比fp16更稳定
ddp_timeout: 180000000  # 分布式训练超时时间

### 评估配置
val_size: 0.1  # 验证集比例
per_device_eval_batch_size: 1  # 评估batch大小
eval_strategy: steps  # 评估策略（按步数评估）
eval_steps: 500  # 评估间隔步数
