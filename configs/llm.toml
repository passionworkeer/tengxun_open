[minimax]
api_type = "anthropic"
api_key_env = "minimax"
api_base = "https://api.minimaxi.com/anthropic"
model = "MiniMax-M2.7"
max_tokens = 4096
temperature = 0.0

[gpt4o]
api_type = "openai"
api_key_env = "OPENAI_API_KEY"
api_base = "https://api.openai.com/v1"
model = "gpt-4o"
max_tokens = 4096
temperature = 0.0

[qwen]
# Qwen3.5-9B via OpenAI-compatible endpoint (e.g. vLLM server).
# Set QWEN_API_KEY and QWEN_API_BASE in .env or environment.
# If running vLLM locally: QWEN_API_BASE=http://localhost:8000/v1
api_type = "openai"
api_key_env = "QWEN_API_KEY"
api_base = "http://localhost:8000/v1"
model = "Qwen/Qwen3.5-9B-Instruct"
max_tokens = 4096
temperature = 0.0

[mock]
api_type = "mock"
model = "mock"
